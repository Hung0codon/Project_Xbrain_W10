apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" # Chạy ở Wave 0 (hạ tầng nền tảng)
spec:
  project: default
  source:
    # Bạn sử dụng trực tiếp Helm chart chính thức của Gatekeeper
    repoURL: 'https://open-policy-agent.github.io/gatekeeper/charts'
    chart: gatekeeper
    targetRevision: 3.14.0 # Chọn một version stable phù hợp
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gatekeeper-system # Đẩy vào namespace hệ thống riêng
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true